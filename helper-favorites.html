<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的收藏 - 项目专员端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .fav-card {
            display: flex; gap: 16px; align-items: flex-start; cursor: pointer;
        }
        .fav-card:active { transform: scale(0.99); }
        .fav-thumb {
            width: 72px; height: 72px; border-radius: 14px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .fav-body { flex: 1; min-width: 0; }
        .fav-title {
            font-size: 15px; font-weight: 700; color: var(--text-main);
            line-height: 1.4; margin-bottom: 6px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .fav-footer { display: flex; align-items: center; gap: 8px; }
        .cat-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
        .cat-疾病基础 { background: #EBF5FF; color: #0052D9; }
        .cat-产品知识 { background: #EAF7F1; color: #2BA471; }
        .cat-合规要求 { background: #FFF2E6; color: #E37318; }
        .cat-AE\/PV流程 { background: #FDEEEE; color: #D54941; }
        .cat-沟通技巧 { background: #F3F2FD; color: #7367F0; }
        .cat-系统操作 { background: #E8F8F5; color: #0097A7; }
        .fav-read { font-size: 11px; color: var(--text-muted); }

        .empty-state {
            padding: 80px 20px; text-align: center; color: var(--text-muted);
        }
        .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="header" style="position: sticky; top: 0; z-index: 10;">
        <div class="back-btn" onclick="history.back()">‹</div>
        <h1>我的收藏</h1>
    </div>

    <div class="container animate-up">
        <div id="favList"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const categoryIcons = {
            '疾病基础': '🧬', '产品知识': '💊', '合规要求': '📜',
            'AE/PV流程': '🚨', '沟通技巧': '💬', '系统操作': '🖥️'
        };
        const categoryBg = {
            '疾病基础': 'linear-gradient(135deg, #EBF5FF 0%, #D6E8FF 100%)',
            '产品知识': 'linear-gradient(135deg, #EAF7F1 0%, #D4F0E4 100%)',
            '合规要求': 'linear-gradient(135deg, #FFF7ED 0%, #FFECD2 100%)',
            'AE/PV流程': 'linear-gradient(135deg, #FFF0F0 0%, #FFE0E0 100%)',
            '沟通技巧': 'linear-gradient(135deg, #F3F2FD 0%, #E8E6FC 100%)',
            '系统操作': 'linear-gradient(135deg, #E8F8F5 0%, #D1F2EC 100%)'
        };

        function renderFavorites() {
            const favIds = App.getHelperFavorites();
            const container = document.getElementById('favList');

            if (favIds.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <h3 style="color: var(--text-main); margin-bottom: 8px;">暂无收藏</h3>
                        <p style="font-size: 14px; line-height: 1.6;">前往「学习中心」探索专业知识，<br>遇到有用的内容别忘了点收藏～</p>
                        <button onclick="App.navigateTo('helper-edu.html')" style="margin-top: 24px; padding: 10px 28px; border-radius: 12px; border: 1px solid var(--primary-color); background: var(--primary-soft); color: var(--primary-color); font-size: 14px; font-weight: 600; cursor: pointer;">去学习中心</button>
                    </div>`;
                return;
            }

            const favArticles = MockData.helperEducation.filter(a => favIds.includes(a.id));
            container.innerHTML = favArticles.map((item, idx) => `
                <div class="card fav-card animate-up" style="animation-delay: ${idx * 0.05}s; margin-bottom: 12px;" onclick="App.navigateTo('helper-edu-detail.html?id=${item.id}')">
                    <div class="fav-thumb" style="background: ${categoryBg[item.category] || '#f5f5f5'};">
                        ${categoryIcons[item.category] || '📄'}
                    </div>
                    <div class="fav-body">
                        <div class="fav-title">${item.title}</div>
                        <div class="fav-footer">
                            <span class="cat-tag cat-${item.category}">${item.category}</span>
                            <span class="fav-read">${item.readCount} 阅读</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderFavorites);
    </script>
</body>
</html>
