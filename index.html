<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>工作台 - 项目专员端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .helper-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 240px;
            background: linear-gradient(180deg, #2BA471 0%, rgba(43, 164, 113, 0) 100%);
            z-index: -1;
        }
        .user-header {
            display: flex; align-items: center; justify-content: space-between; margin-top: 30px; margin-bottom: 24px;
            color: white;
        }
        .user-profile { display: flex; align-items: center; gap: 16px; }
        .avatar {
            width: 68px; height: 68px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.4);
            box-shadow: var(--shadow-md);
        }
        .user-info h2 { font-size: 22px; margin-bottom: 4px; }
        .user-info p { font-size: 13px; opacity: 0.85; }

        .notification-bell {
            width: 44px; height: 44px; background: rgba(255,255,255,0.2); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            position: relative; cursor: pointer;
        }
        .bell-badge {
            position: absolute; top: 0; right: 0; background: var(--danger-color);
            color: white; font-size: 10px; min-width: 18px; height: 18px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 2px solid #2BA471;
        }

    </style>
</head>
<body>
    <div class="helper-bg"></div>

    <div class="container">
        <!-- 头部信息 -->
        <div class="user-header animate-up">
            <div class="user-profile">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mimi" class="avatar" id="userAvatar">
                <div class="user-info">
                    <h2 id="userName">陈美琳</h2>
                    <p id="userRole">项目专员</p>
                </div>
            </div>
            <div class="notification-bell" onclick="App.navigateTo('messages.html')">
                <span>🔔</span>
                <div class="bell-badge" id="msgBadge">2</div>
            </div>
        </div>
        
        <div style="font-size: 11px; margin-bottom: 24px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; display: inline-block; color: white; animation: slideUp 0.5s ease-out forwards;">
            📍 华东中心 - 瑞金医院
        </div>

        <!-- 核心统计 -->
        <div class="stats-grid animate-up" style="animation-delay: 0.1s; cursor: pointer;" onclick="App.navigateTo('patient-list.html')">
            <div class="stats-item">
                <div class="stats-value" id="statTotal">84</div>
                <div class="stats-label">管理患者</div>
            </div>
            <div class="stats-item">
                <div class="stats-value" id="statEnrolled">12</div>
                <div class="stats-label">本月入组</div>
            </div>
            <div class="stats-item">
                <div class="stats-value" id="statPending" style="color: var(--warning-color);">5</div>
                <div class="stats-label">待办随访</div>
            </div>
        </div>

        <!-- 项目看板卡片 (移动至此处) -->
        <div class="card animate-up" onclick="App.navigateTo('messages.html')" style="animation-delay: 0.15s; background: linear-gradient(135deg, #1D2129 0%, #4E5969 100%); color: white; border: none; padding: 16px 20px; cursor: pointer;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 16px;">📢</span>
                    <h3 style="font-size: 14px; font-weight: 700;">项目公告</h3>
                </div>
                <span style="font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 4px;">New</span>
            </div>
            <p style="font-size: 12px; line-height: 1.5; opacity: 0.85; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                【置顶】ADC 研究项目 V2.4 补丁说明：请各位专员务必于周五前完成 D10 随访质控核对...
            </p>
        </div>

        <!-- 学习中心入口 -->
        <div class="card animate-up" onclick="App.navigateTo('helper-edu.html')" style="animation-delay: 0.18s; background: linear-gradient(135deg, #EAF7F1 0%, #D4F0E4 100%); border: 1px solid rgba(43, 164, 113, 0.15); cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 16px;">
                <div style="width: 52px; height: 52px; border-radius: 16px; background: var(--primary-gradient); display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 16px rgba(43, 164, 113, 0.15);">📖</div>
                <div style="flex: 1;">
                    <h3 style="font-size: 15px; font-weight: 700; color: var(--text-main); margin-bottom: 4px;">学习中心</h3>
                    <p style="font-size: 12px; color: var(--text-secondary);">疾病知识 · 产品要点 · AE 流程 · 沟通技巧</p>
                </div>
                <span style="color: var(--primary-color); font-size: 18px; font-weight: 600;">›</span>
            </div>
        </div>

        <!-- 功能矩阵 - 入组与综合 -->
        <div class="section-title animate-up" style="animation-delay: 0.2s;">
            核心职能 <span>更多应用 ›</span>
        </div>
        <div class="action-grid animate-up" style="animation-delay: 0.2s;">
            <div class="action-btn" onclick="App.navigateTo('enroll-form.html')">
                <div class="action-icon bg-green">✨</div>
                <div class="action-label">现场入组</div>
            </div>
            <div class="action-btn" onclick="App.navigateTo('edu-form.html')">
                <div class="action-icon bg-blue">📚</div>
                <div class="action-label">首周期教育</div>
            </div>
            <div class="action-btn" onclick="App.navigateTo('followup-form.html')">
                <div class="action-icon bg-orange">📅</div>
                <div class="action-label">标准随访</div>
            </div>
            <div class="action-btn" onclick="App.navigateTo('recall-form.html')">
                <div class="action-icon bg-rose">📞</div>
                <div class="action-label">失访召回</div>
            </div>
        </div>

        <div class="action-grid animate-up" style="animation-delay: 0.25s;">
            <div class="action-btn" onclick="App.navigateTo('patient-list.html')">
                <div class="action-icon bg-teal">👥</div>
                <div class="action-label">患者管理</div>
            </div>
            <div class="action-btn" onclick="App.navigateTo('abnormal-form.html')">
                <div class="action-icon bg-purple">⚠️</div>
                <div class="action-label">异常回流</div>
            </div>
            <div class="action-btn" onclick="App.navigateTo('task-list.html?type=remind')">
                <div class="action-icon bg-blue" style="filter: hue-rotate(45deg);">⏰</div>
                <div class="action-label">周期提醒</div>
            </div>
            <div class="action-btn" onclick="App.navigateTo('report-center.html#reports')">
                <div class="action-icon bg-orange" style="filter: hue-rotate(-20deg);">📋</div>
                <div class="action-label">周月报</div>
            </div>
        </div>

        <!-- 待办任务流 -->
        <div class="section-title animate-up" style="animation-delay: 0.3s;">
            今日待办 <span>查看全部 ›</span>
        </div>
        <div class="card animate-up" style="animation-delay: 0.35s; padding: 5px 20px;">
            <div id="todoList">
                <!-- 由 JS 渲染 -->
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="tab-bar">
        <a href="#" class="tab-item active">
            <span class="tab-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="#" class="tab-item" onclick="App.navigateTo('task-list.html')">
            <span class="tab-icon" style="position: relative;">📋 <span class="badge">14</span></span>
            <span>任务管理</span>
        </a>
        <a href="#" class="tab-item" onclick="App.navigateTo('patient-list.html')">
            <span class="tab-icon">👥</span>
            <span>患者管理</span>
        </a>
        <a href="#" class="tab-item" onclick="App.navigateTo('report-center.html')">
            <span class="tab-icon">📊</span>
            <span>数据报表</span>
        </a>
        <a href="#" class="tab-item" onclick="App.navigateTo('my.html')">
            <span class="tab-icon">👤</span>
            <span>我的</span>
        </a>
    </nav>

    <script src="js/app.js"></script>
    <script>
        function renderPage() {
            const user = App.getUser();
            const stats = App.getStats();
            const todos = App.getTodos();

            document.getElementById('userName').innerText = user.name;
            document.getElementById('statTotal').innerText = stats.totalPatients;
            document.getElementById('statEnrolled').innerText = stats.monthlyEnrolled;
            document.getElementById('statPending').innerText = stats.pendingFollowup;
            
            const msgCount = App.getUnreadCount();
            const badge = document.getElementById('msgBadge');
            if (msgCount > 0) {
                badge.innerText = msgCount;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }

            const list = document.getElementById('todoList');
            list.innerHTML = todos.map(item => `
                <div class="todo-item ${item.type === '异常回流' ? 'is-abnormal' : ''}" onclick="App.navigateTo('task-detail.html?id=${item.id}')">
                    <div class="todo-info">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="priority-tag priority-${item.priority}">${item.priority === 'high' ? '高' : (item.priority === 'med' ? '中' : '低')}</span>
                            <span class="todo-title">${item.type} - ${item.patient}</span>
                        </div>
                        <div class="todo-desc">${item.desc}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 4px;">${item.time}</div>
                        <div class="todo-action">处理</div>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderPage);
    </script>
</body>
</html>
