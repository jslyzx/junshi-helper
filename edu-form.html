<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>首周期教育 - 项目专员端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
        .step-indicator::before { content: ''; position: absolute; top: 15px; left: 0; right: 0; height: 2px; background: #E5E6EB; z-index: 1; }
        .step-dot {
            width: 32px; height: 32px; border-radius: 50%; background: white; border: 2px solid #E5E6EB;
            display: flex; align-items: center; justify-content: center; z-index: 2; font-size: 12px; font-weight: 700; color: var(--text-muted);
            transition: all 0.3s;
        }
        .step-dot.active { background: var(--info-color); border-color: var(--info-color); color: white; }
        .step-dot.completed { background: #EBF5FF; border-color: var(--info-color); color: var(--info-color); }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .form-input {
            width: 100%; height: 48px; border-radius: 12px; border: 1px solid #E5E6EB; padding: 0 16px;
            font-size: 15px; font-family: inherit; transition: border-color 0.2s; background: white;
        }
        .form-input:focus { outline: none; border-color: var(--info-color); background: #F8FBFF; }
        
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; }
        .checkbox-item { 
            display: flex; align-items: flex-start; gap: 10px; font-size: 14px; 
            background: white; padding: 14px 16px; border-radius: 12px; border: 1px solid #E5E6EB;
        }
        .checkbox-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--info-color); margin-top: 2px; }
        .checkbox-text { display: flex; flex-direction: column; gap: 4px; }
        .checkbox-title { font-weight: 600; color: var(--text-main); }
        .checkbox-desc { font-size: 12px; color: var(--text-muted); }

        .btn-group {
            position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; padding-bottom: calc(20px + var(--safe-area-bottom));
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid #F0F2F5; display: flex; gap: 12px; z-index: 100;
        }
        .btn-flex { flex: 1; height: 50px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-flex:active { transform: scale(0.96); opacity: 0.9; }
        .btn-outline { background: #F2F3F5; color: var(--text-secondary); }
        .btn-primary { background: linear-gradient(135deg, #0052D9 0%, #003EB3 100%); color: white; box-shadow: 0 12px 32px rgba(0, 82, 217, 0.2); }

        /* 图片上传样式 */
        .upload-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px;
        }
        .upload-item {
            aspect-ratio: 1; border-radius: 12px; border: 1.5px dashed #E5E6EB;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
            background: #FAFBFC;
        }
        .upload-item:active { background: #F2F3F5; transform: scale(0.98); }
        .upload-item.has-img { border-style: solid; border-color: var(--info-color); }
        .upload-item img { width: 100%; height: 100%; object-fit: cover; }
        .upload-item .del-btn {
            position: absolute; top: 4px; right: 4px; width: 18px; height: 18px;
            background: rgba(0,0,0,0.5); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 10px; z-index: 5;
        }
    </style>
</head>
<body>
    <div class="header" style="position: sticky; top: 0; z-index: 10;">
        <div class="back-btn" onclick="history.back()">✕</div>
        <h1>患者首周期教育</h1>
    </div>

    <div class="container" style="padding-bottom: 120px;">
        <div class="step-indicator">
            <div class="step-dot active">1</div>
            <div class="step-dot">2</div>
            <div class="step-dot">3</div>
        </div>

        <!-- 步骤 1: 准备工作 -->
        <div id="step1" class="animate-up">
            <div class="section-title">教育对象</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">选择待教育患者</label>
                    <select class="form-input">
                        <option value="">请选择患者...</option>
                        <option value="1" selected>曹*云 (首周期药物输注前)</option>
                        <option value="2">王*建 (初次入组后)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">本次宣教媒介使用</label>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn-flex btn-outline" style="background: #EBF5FF; border-color: #0052D9; color: #0052D9;">小程序视频</button>
                        <button class="btn-flex btn-outline">纸质手册</button>
                        <button class="btn-flex btn-outline">仅口头宣导</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 步骤 2: 核心宣教内容核查 -->
        <div id="step2" class="hidden">
            <div class="section-title">内容核点 (Checklist)</div>
            <div class="card">
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px;">请向患者及家属逐一讲解以下要点，完成一项勾选一项：</p>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox">
                        <div class="checkbox-text">
                            <span class="checkbox-title">ADC 药物作用机制简介</span>
                            <span class="checkbox-desc">通俗解释靶向药物的“生物导弹”原理。</span>
                        </div>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox">
                        <div class="checkbox-text">
                            <span class="checkbox-title">用药依从性重要性</span>
                            <span class="checkbox-desc">强调严格按周期（如21天）回院输注的必要性。</span>
                        </div>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox">
                        <div class="checkbox-text">
                            <span class="checkbox-title">不良反应监测宣教</span>
                            <span class="checkbox-desc">讲解潜在的恶心、骨髓抑制或皮疹，告知如何区分轻重症。</span>
                        </div>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox">
                        <div class="checkbox-text">
                            <span class="checkbox-title">紧急联系机制发放</span>
                            <span class="checkbox-desc">引导患者使用患者端小程序绑定，告知专员联系电话。</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="section-title">留存工作记录</div>
            <div class="card">
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">上传宣教现场照片，留存服务记录：</p>
                <div class="upload-grid" id="workImages">
                    <div class="upload-item" onclick="triggerWorkUpload()">
                        <span style="font-size: 24px; color: #999;">+</span>
                        <span style="font-size: 10px; color: #999; margin-top: 4px;">上传图片</span>
                    </div>
                </div>
                <input type="file" id="workFileInput" hidden accept="image/*" capture="environment" multiple>
            </div>
        </div>

        <!-- 步骤 3: 评估与确认 -->
        <div id="step3" class="hidden">
            <div class="section-title">依从性评估</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">患者或家属认知评估</label>
                    <select class="form-input">
                        <option>优秀 - 完全理解并配合</option>
                        <option>良好 - 基本理解</option>
                        <option>一般 - 需要后续加强宣教</option>
                        <option>差 - 沟通存在较大障碍</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">额外情况备注 (选填)</label>
                    <textarea class="form-input" style="height: 80px; padding-top: 12px; resize: none;" placeholder="比如：主要是女儿在听，老人家听力不佳..."></textarea>
                </div>
            </div>

            <div class="section-title">宣教确认</div>
            <div class="card">
                <p style="font-size: 13px; color: var(--text-secondary); line-height: 1.6;">
                    本人保证，已完整传达上述首周期内容，解答了患者的疑问，并发放了相关资料。
                </p>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-flex btn-outline" id="prevBtn" onclick="prevStep()" style="display: none;">上一步</button>
        <button class="btn-flex btn-primary" id="nextBtn" onclick="nextStep()">下一步</button>
    </div>

    <script>
        let currentStep = 1;

        function nextStep() {
            if (currentStep < 3) {
                document.getElementById(`step${currentStep}`).classList.add('hidden');
                document.getElementById(`step${currentStep}`).classList.remove('animate-up');
                
                const dots = document.querySelectorAll('.step-dot');
                dots[currentStep-1].classList.remove('active');
                dots[currentStep-1].classList.add('completed');
                
                currentStep++;
                
                const nextSection = document.getElementById(`step${currentStep}`);
                nextSection.classList.remove('hidden');
                void nextSection.offsetWidth; 
                nextSection.classList.add('animate-up');
                
                dots[currentStep-1].classList.add('active');
                
                updateBtns();
                window.scrollTo(0, 0);
            } else {
                alert('首周期教育记录已完成登记！');
                window.location.href = 'index.html';
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                document.getElementById(`step${currentStep}`).classList.add('hidden');
                document.getElementById(`step${currentStep}`).classList.remove('animate-up');
                
                const dots = document.querySelectorAll('.step-dot');
                dots[currentStep-1].classList.remove('active');

                currentStep--;
                
                const prevSection = document.getElementById(`step${currentStep}`);
                prevSection.classList.remove('hidden');
                void prevSection.offsetWidth;
                prevSection.classList.add('animate-up');
                
                dots[currentStep-1].classList.remove('completed');
                dots[currentStep-1].classList.add('active');

                updateBtns();
                window.scrollTo(0, 0);
            }
        }

        function updateBtns() {
            document.getElementById('prevBtn').style.display = currentStep === 1 ? 'none' : 'block';
            document.getElementById('nextBtn').innerText = currentStep === 3 ? '确认完成教导' : '下一步';
        }

        // 工作图片上传逻辑
        const workImages = [];
        const workFileInput = document.getElementById('workFileInput');
        
        function triggerWorkUpload() {
            workFileInput.click();
        }

        workFileInput.addEventListener('change', function() {
            if (!this.files.length) return;
            
            Array.from(this.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    workImages.push(e.target.result);
                    renderWorkImages();
                };
                reader.readAsDataURL(file);
            });
            this.value = '';
        });

        function renderWorkImages() {
            const container = document.getElementById('workImages');
            let html = workImages.map((src, i) => `
                <div class="upload-item has-img">
                    <img src="${src}">
                    <div class="del-btn" onclick="removeWorkImg(${i})">✕</div>
                </div>
            `).join('');
            
            if (workImages.length < 6) {
                html += `
                    <div class="upload-item" onclick="triggerWorkUpload()">
                        <span style="font-size: 24px; color: #999;">+</span>
                        <span style="font-size: 10px; color: #999; margin-top: 4px;">上传图片</span>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function removeWorkImg(index) {
            workImages.splice(index, 1);
            renderWorkImages();
        }
    </script>
</body>
</html>
