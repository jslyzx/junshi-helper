<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>患者管理 - 项目专员端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .search-container {
            position: sticky; top: 64px; z-index: 90;
            background: var(--bg-gradient); padding: 16px 20px;
            margin: 0 -20px;
        }
        .search-box {
            background: white; border-radius: 12px; height: 48px;
            display: flex; align-items: center; padding: 0 16px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
        }
        .search-input { border: none; flex: 1; outline: none; font-size: 14px; margin-left: 10px; background: transparent; }
        
        .patient-list-card {
            background: var(--glass-bg); border-radius: 20px; padding: 16px; margin-bottom: 12px;
            border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 16px;
            transition: transform 0.2s; cursor: pointer;
        }
        .patient-list-card:active { transform: scale(0.98); }
        
        .patient-avatar {
            width: 50px; height: 50px; border-radius: 15px;
            background: var(--primary-soft); color: var(--primary-color);
            display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700;
        }
        
        .patient-info { flex: 1; }
        .patient-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .patient-name { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .patient-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; }
        
        .status-badge {
            font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600;
        }
        .status-success { background: #EAF7F1; color: #2BA471; }
        .status-warning { background: #FFF2E6; color: #E37318; }
        .status-danger { background: #FDEEEE; color: #D54941; }
        .status-info { background: #E6F1FF; color: #0052D9; }
        .status-muted { background: #F0F2F5; color: #86909C; }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="App.navigateTo('index.html')">‹</div>
        <h1>患者管理</h1>
        <div style="width: 32px;"></div>
    </div>

    <div class="container animate-up">
        <div class="search-container">
            <div class="search-box">
                <span style="font-size: 16px; opacity: 0.5;">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索患者姓名、手机号、疾病..." oninput="filterPatients()">
            </div>
        </div>

        <div id="patientListContainer">
            <!-- 由 JS 渲染 -->
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="tab-bar">
        <a href="index.html" class="tab-item">
            <span class="tab-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="task-list.html" class="tab-item">
            <span class="tab-icon">📋</span>
            <span>任务管理</span>
        </a>
        <a href="patient-list.html" class="tab-item active">
            <span class="tab-icon">👥</span>
            <span>患者管理</span>
        </a>
        <a href="report-center.html" class="tab-item">
            <span class="tab-icon">📊</span>
            <span>数据报表</span>
        </a>
        <a href="my.html" class="tab-item">
            <span class="tab-icon">👤</span>
            <span>我的</span>
        </a>
    </nav>

    <script src="js/app.js"></script>
    <script>
        let allPatients = [];

        function renderList(patients) {
            const container = document.getElementById('patientListContainer');
            if (patients.length === 0) {
                container.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px;">暂无匹配患者</div>`;
                return;
            }
            
            container.innerHTML = patients.map(p => `
                <div class="patient-list-card ${p.statusTag === 'danger' ? 'is-abnormal' : ''}" onclick="App.navigateTo('patient-detail.html?id=${p.id}')">
                    <div class="patient-avatar" style="${p.statusTag === 'danger' ? 'background:#FDEEEE; color:#D54941' : ''}">${p.name.charAt(0)}</div>
                    <div class="patient-info">
                        <div class="patient-name-row">
                            <span class="patient-name">${p.name}</span>
                            <span class="status-badge status-${p.statusTag}">${p.status}</span>
                        </div>
                        <div class="patient-meta">
                            <span>${p.disease}</span>
                            <span>周期: ${p.cycle}</span>
                        </div>
                    </div>
                    <div style="color: var(--text-muted); font-size: 18px;">›</div>
                </div>
            `).join('');
        }

        function filterPatients() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allPatients.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.disease.toLowerCase().includes(query) ||
                p.phone.includes(query)
            );
            renderList(filtered);
        }

        document.addEventListener('DOMContentLoaded', () => {
            allPatients = App.getPatients();
            renderList(allPatients);
        });
    </script>
</body>
</html>
