<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>现场入组 - 项目专员端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .doc-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px;
        }
        .doc-upload-card {
            background: white; border-radius: 20px; padding: 20px 16px;
            border: 2px dashed rgba(43, 164, 113, 0.15); text-align: center;
            cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
        }
        .doc-upload-card:active { transform: scale(0.96); }
        .doc-upload-card.uploaded {
            border-style: solid; border-color: var(--success-color);
            background: #F0FFF4;
        }
        .doc-upload-card .doc-icon {
            width: 52px; height: 52px; border-radius: 16px; margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }
        .doc-upload-card .doc-name { font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 4px; }
        .doc-upload-card .doc-hint { font-size: 11px; color: var(--text-muted); }
        .doc-upload-card .doc-check {
            display: none; position: absolute; top: 10px; right: 10px;
            width: 22px; height: 22px; border-radius: 50%; background: var(--success-color);
            color: white; font-size: 12px; line-height: 22px; text-align: center;
        }
        .doc-upload-card.uploaded .doc-check { display: block; }
        .doc-upload-card .doc-thumb {
            display: none; width: 100%; height: 60px; object-fit: cover;
            border-radius: 8px; margin-top: 8px;
        }
        .doc-upload-card.uploaded .doc-thumb { display: block; }

        .consent-multi-area {
            margin-top: 14px; padding: 16px; background: white;
            border-radius: 20px; border: 1px solid #F0F2F5;
        }
        .consent-pages { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; }
        .consent-page-item {
            position: relative; flex-shrink: 0; width: 80px; height: 106px;
            border-radius: 12px; overflow: hidden; border: 1px solid #E5E6EB;
        }
        .consent-page-item img { width: 100%; height: 100%; object-fit: cover; }
        .consent-page-num {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.5); color: white; font-size: 10px;
            text-align: center; padding: 2px 0;
        }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text-main); }
        .form-input {
            width: 100%; height: 48px; border-radius: 12px; border: 1px solid #E5E6EB; padding: 0 16px;
            font-size: 15px; font-family: inherit; transition: border-color 0.2s; background: white;
        }

        .viewer-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .viewer-modal.active { display: flex; }
        .viewer-img { max-width: 95%; max-height: 85%; object-fit: contain; border-radius: 8px; }
        .viewer-close { position: absolute; top: 40px; right: 25px; color: white; font-size: 24px; z-index: 2010; }

        .btn-primary { 
            width: 100%; height: 52px; border-radius: 16px; border: none; font-size: 16px; font-weight: 700; cursor: pointer;
            background: var(--primary-gradient); color: white; box-shadow: 0 8px 20px rgba(43,164,113,0.2);
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="history.back()">✕</div>
        <h1>患者现场入组</h1>
    </div>

    <div class="container animate-up">
        <!-- 上传材料区 - 复用协助上传组件 -->
        <div style="font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 1px;">上传材料</div>
        <div class="doc-grid">
            <div class="doc-upload-card" id="card-idcard" onclick="triggerUpload('idcard')">
                <div class="doc-icon" style="background: #EAF7F1;">🪪</div>
                <div class="doc-name">身份证正面</div>
                <div class="doc-hint">必传 · 拍照上传</div>
                <div class="doc-check">✓</div>
                <img class="doc-thumb" id="thumb-idcard" onclick="event.stopPropagation(); openViewer(this.src)">
            </div>
            <div class="doc-upload-card" id="card-diagnosis" onclick="triggerUpload('diagnosis')">
                <div class="doc-icon" style="background: #FFF2E6;">📋</div>
                <div class="doc-name">诊断证明</div>
                <div class="doc-hint">必传 · 拍照上传</div>
                <div class="doc-check">✓</div>
                <img class="doc-thumb" id="thumb-diagnosis" onclick="event.stopPropagation(); openViewer(this.src)">
            </div>
            <div class="doc-upload-card" id="card-prescription" onclick="triggerUpload('prescription')">
                <div class="doc-icon" style="background: #E8F8E8;">💊</div>
                <div class="doc-name">处方单</div>
                <div class="doc-hint">选传 · 拍照上传</div>
                <div class="doc-check">✓</div>
                <img class="doc-thumb" id="thumb-prescription" onclick="event.stopPropagation(); openViewer(this.src)">
            </div>
            <div class="doc-upload-card" id="card-consent" onclick="triggerConsentUpload()">
                <div class="doc-icon" style="background: #F3E8FF;">🖋️</div>
                <div class="doc-name">知情同意书</div>
                <div class="doc-hint" id="consent-hint">必传 · 支持多页</div>
                <div class="doc-check">✓</div>
                <img class="doc-thumb" style="display:none">
            </div>
        </div>

        <!-- 知情同意书多页预览区 -->
        <div class="consent-multi-area" id="consentMultiArea" style="display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                <span style="font-size: 14px; font-weight: 700;">🖋️ 知情同意书</span>
                <span style="font-size: 12px; color: var(--text-muted);" id="consentCountText">已上传 0 页</span>
            </div>
            <div class="consent-pages" id="consentPages">
                <!-- 由 JS 渲染 -->
            </div>
        </div>

        <!-- 识别结果核对 -->
        <div id="ocrResult" class="hidden animate-up" style="margin-top: 24px;">
            <div class="section-title">识别核对</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">患者姓名</label>
                    <input type="text" class="form-input" id="r-name" placeholder="待识别">
                </div>
                <div class="form-group">
                    <label class="form-label">身份证号</label>
                    <input type="text" class="form-input" id="r-idcard" placeholder="待识别">
                </div>
                <div class="form-group">
                    <label class="form-label">确诊疾病</label>
                    <input type="text" class="form-input" id="r-disease" placeholder="待识别">
                </div>
            </div>
        </div>

        <button class="btn-primary" onclick="handleSubmit()">确认提交入组</button>
        <p style="text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 16px; padding-bottom: 30px;">
            提交后资料将进入中心质控审核流程
        </p>

        <input type="file" id="fileInput" hidden accept="image/*" capture="environment">
        <input type="file" id="consentFileInput" hidden accept="image/*" capture="environment">
    </div>

    <!-- 全屏预览 -->
    <div id="imageViewer" class="viewer-modal" onclick="closeViewer()">
        <div class="viewer-close">✕</div>
        <img id="viewerImg" class="viewer-img">
    </div>

    <script>
        let currentUploadType = '';
        const consentPages = [];

        function triggerUpload(type) {
            currentUploadType = type;
            document.getElementById('fileInput').click();
        }

        function triggerConsentUpload() {
            document.getElementById('consentFileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const src = event.target.result;
                const card = document.getElementById(`card-${currentUploadType}`);
                card.classList.add('uploaded');
                const thumb = document.getElementById(`thumb-${currentUploadType}`);
                thumb.src = src;
                
                // 模拟 OCR
                if (currentUploadType === 'idcard') {
                    document.getElementById('r-name').value = '林建国';
                    document.getElementById('r-idcard').value = '310115199203151234';
                } else if (currentUploadType === 'diagnosis') {
                    document.getElementById('r-disease').value = '晚期实体瘤 (ADC 研究)';
                }
                document.getElementById('ocrResult').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('consentFileInput').addEventListener('change', function(e) {
            if (!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                consentPages.push(event.target.result);
                renderConsentPages();
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function renderConsentPages() {
            document.getElementById('consentMultiArea').style.display = 'block';
            document.getElementById('card-consent').classList.add('uploaded');
            document.getElementById('consentCountText').innerText = `已上传 ${consentPages.length} 页`;
            
            const container = document.getElementById('consentPages');
            let html = consentPages.map((src, i) => `
                <div class="consent-page-item" onclick="openViewer('${src}')">
                    <img src="${src}">
                    <div class="consent-page-num">${i + 1}</div>
                </div>
            `).join('');
            
            html += `
                <div class="doc-upload-card" style="width: 80px; height: 106px; flex-shrink: 0;" onclick="triggerConsentUpload()">
                    <div style="font-size: 20px;">+</div>
                    <div style="font-size: 10px;">添加</div>
                </div>
            `;
            container.innerHTML = html;
        }

        function openViewer(src) {
            document.getElementById('viewerImg').src = src;
            document.getElementById('imageViewer').classList.add('active');
        }

        function closeViewer() {
            document.getElementById('imageViewer').classList.remove('active');
        }

        function handleSubmit() {
            if (!document.getElementById('r-name').value) {
                alert('请先上传身份证识别基础信息');
                return;
            }
            if (consentPages.length === 0) {
                alert('请至少上传一页知情同意书');
                return;
            }
            alert('现场入组申请已提交！正在等待质控审核。');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
