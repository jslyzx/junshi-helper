<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>工作纪实 - 项目专员端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .record-card {
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px;
            box-shadow: var(--shadow-md); border: 1px solid var(--glass-border);
        }
        .upload-area {
            border: 2px dashed rgba(43, 164, 113, 0.2); border-radius: 16px;
            padding: 30px 20px; text-align: center; cursor: pointer;
            transition: all 0.2s; background: var(--primary-soft);
        }
        .upload-area:active { transform: scale(0.98); background: #EAF7F1; }
        
        .file-item {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            background: #F8F9FA; border-radius: 12px; margin-top: 12px;
        }
        .file-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .bg-pdf { background: #FDEEEE; color: #D54941; }
        .bg-excel { background: #EAF7F1; color: #2BA471; }
        .bg-img { background: #E8F3FF; color: #0052D9; }

        .type-container {
            display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; 
            padding: 4px 0; -webkit-overflow-scrolling: touch;
        }
        .type-container::-webkit-scrollbar { display: none; }
        
        .type-tag {
            flex-shrink: 0; padding: 8px 16px; border-radius: 12px; font-size: 13px; 
            font-weight: 500; cursor: pointer; border: 1px solid #F0F2F5; 
            background: #F8F9FA; color: var(--text-secondary); transition: all 0.2s;
        }
        .type-tag.active { 
            background: var(--primary-gradient); color: white; border-color: transparent;
            box-shadow: 0 4px 12px rgba(43, 164, 113, 0.2);
        }

        .submit-btn {
            width: 100%; height: 52px; border: none; border-radius: 16px;
            background: var(--primary-gradient); color: white; font-size: 16px;
            font-weight: 700; margin-top: 24px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(43, 164, 113, 0.2);
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:active { transform: scale(0.98); box-shadow: 0 4px 10px rgba(43, 164, 113, 0.1); }

        .remark-area {
            width: 100%; border: 1px solid #F0F2F5; margin-top: 16px; padding: 16px; 
            font-size: 14px; min-height: 120px; border-radius: 16px; background: #F8F9FA;
            font-family: inherit; resize: none; transition: all 0.2s;
        }
        .remark-area:focus { border-color: var(--primary-color); background: white; outline: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="history.back()">‹</div>
        <h1>工作纪实</h1>
        <div style="width: 32px;"></div>
    </div>

    <div class="container animate-up">
        <!-- 上传区域 -->
        <div class="record-card">
            <div style="font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 16px;">记录上传</div>
            
            <div class="type-container">
                <span class="type-tag active">补访记录</span>
                <span class="type-tag">通话录音</span>
                <span class="type-tag">工作周报</span>
                <span class="type-tag">现场照片</span>
                <span class="type-tag">其他备查</span>
            </div>
            
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div style="font-size: 40px; margin-bottom: 12px;">☁️</div>
                <div style="font-size: 15px; font-weight: 700; color: var(--text-main);">选择附件上传</div>
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 6px;">支持 PDF、Excel、Word 或图片</div>
            </div>
            <input type="file" id="fileInput" hidden multiple>

            <div id="selectedFiles"></div>

            <textarea class="remark-area" placeholder="备注说明（如有需记录的细节请在此输入）..."></textarea>
            
            <button class="submit-btn" onclick="handleUpload()">
                <span>🚀</span> 提交记录
            </button>
        </div>

        <!-- 历史记录 -->
        <div class="section-title">最近记录</div>
        <div class="record-card">
            <div class="history-item">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-size: 14px; font-weight: 700;">2024-04-26 补访记录汇排</span>
                    <span style="font-size: 11px; color: var(--text-muted);">昨天 16:30</span>
                </div>
                <div class="file-item">
                    <div class="file-icon bg-pdf">PDF</div>
                    <div style="flex: 1;">
                        <div style="font-size: 13px; font-weight: 600;">4月第四周补访汇总.pdf</div>
                        <div style="font-size: 11px; color: var(--text-muted);">1.2 MB</div>
                    </div>
                    <span>›</span>
                </div>
            </div>

            <div class="history-item">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-size: 14px; font-weight: 700;">患者电话访谈录音</span>
                    <span style="font-size: 11px; color: var(--text-muted);">前天 10:15</span>
                </div>
                <div class="file-item">
                    <div class="file-icon bg-img">🎵</div>
                    <div style="flex: 1;">
                        <div style="font-size: 13px; font-weight: 600;">CALL_REC_林建国.mp3</div>
                        <div style="font-size: 11px; color: var(--text-muted);">3.5 MB</div>
                    </div>
                    <span>›</span>
                </div>
            </div>

            <div class="history-item">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-size: 14px; font-weight: 700;">4月月度报表补充</span>
                    <span style="font-size: 11px; color: var(--text-muted);">2024-04-20</span>
                </div>
                <div class="file-item">
                    <div class="file-icon bg-excel">XLS</div>
                    <div style="flex: 1;">
                        <div style="font-size: 13px; font-weight: 600;">随访漏报数据补登.xlsx</div>
                        <div style="font-size: 11px; color: var(--text-muted);">45 KB</div>
                    </div>
                    <span>›</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = e.target.files;
            const container = document.getElementById('selectedFiles');
            container.innerHTML = '';
            for (let file of files) {
                const ext = file.name.split('.').pop().toUpperCase();
                const iconClass = ext === 'PDF' ? 'bg-pdf' : (['XLS', 'XLSX', 'CSV'].includes(ext) ? 'bg-excel' : 'bg-img');
                
                container.innerHTML += `
                    <div class="file-item animate-up">
                        <div class="file-icon ${iconClass}">${ext}</div>
                        <div style="flex: 1;">
                            <div style="font-size: 13px; font-weight: 600;">${file.name}</div>
                            <div style="font-size: 11px; color: var(--text-muted);">${(file.size/1024/1024).toFixed(2)} MB</div>
                        </div>
                        <div style="color: var(--danger-color); font-size: 18px;">✕</div>
                    </div>
                `;
            }
        });

        function handleUpload() {
            alert('记录上传成功！系统已自动归档至项目管理后台。');
            history.back();
        }

        // 切换标签
        document.querySelectorAll('.type-tag').forEach(tag => {
            tag.onclick = function() {
                document.querySelectorAll('.type-tag').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            };
        });
    </script>
</body>
</html>
