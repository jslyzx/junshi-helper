<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>协助患者建档 - 项目专员端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .doc-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px;
        }
        .doc-upload-card {
            background: white; border-radius: 20px; padding: 20px 16px;
            border: 2px dashed rgba(43, 164, 113, 0.15); text-align: center;
            cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
        }
        .doc-upload-card:active { transform: scale(0.96); }
        .doc-upload-card.uploaded {
            border-style: solid; border-color: var(--success-color);
            background: #F0FFF4;
        }
        .doc-upload-card .doc-icon {
            width: 52px; height: 52px; border-radius: 16px; margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }
        .doc-upload-card .doc-name { font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 4px; }
        .doc-upload-card .doc-hint { font-size: 11px; color: var(--text-muted); }
        .doc-upload-card .doc-check {
            display: none; position: absolute; top: 10px; right: 10px;
            width: 22px; height: 22px; border-radius: 50%; background: var(--success-color);
            color: white; font-size: 12px; line-height: 22px; text-align: center;
        }
        .doc-upload-card.uploaded .doc-check { display: block; }
        .doc-upload-card .doc-thumb {
            display: none; width: 100%; height: 60px; object-fit: cover;
            border-radius: 8px; margin-top: 8px;
        }
        .doc-upload-card.uploaded .doc-thumb { display: block; }
        .doc-upload-card.uploaded .doc-hint { color: var(--success-color); }

        .ocr-loading { display: none; text-align: center; padding: 40px 0; }
        .ocr-loading.active { display: block; }
        .ocr-spinner {
            width: 48px; height: 48px; border: 3px solid var(--primary-soft);
            border-top-color: var(--primary-color); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .ocr-result { display: none; }
        .ocr-result.active { display: block; }
        .result-field {
            display: flex; align-items: center; padding: 14px 0;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
        }
        .result-field:last-child { border-bottom: none; }
        .result-label { width: 90px; font-size: 14px; color: var(--text-muted); flex-shrink: 0; }
        .result-value {
            flex: 1; border: none; background: transparent; font-size: 15px;
            font-weight: 600; color: var(--text-main); outline: none; text-align: right;
        }
        .result-value:focus { color: var(--primary-color); }
        .result-tag {
            font-size: 10px; background: var(--primary-soft); color: var(--primary-color);
            padding: 2px 6px; border-radius: 4px; margin-left: 8px; white-space: nowrap;
        }
        .required-mark { color: var(--danger-color); margin-right: 2px; }

        /* 专员端表单容器 */
        .form-section {
            background: white; border-radius: 20px; padding: 8px 16px;
            margin-bottom: 16px; box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.03);
        }

        /* 知情同意书多页上传 */
        .consent-multi-area {
            margin-top: 14px; padding: 16px; background: white;
            border-radius: 20px; border: 1px solid #F0F2F5;
        }
        .consent-header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
        }
        .consent-header-title { font-size: 14px; font-weight: 700; color: var(--text-main); }
        .consent-count { font-size: 12px; color: var(--text-muted); }
        .consent-pages {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .consent-pages::-webkit-scrollbar { display: none; }
        .consent-page-item {
            position: relative; flex-shrink: 0; width: 80px; height: 106px;
            border-radius: 12px; overflow: hidden; border: 1px solid #E5E6EB;
            box-shadow: var(--shadow-sm);
        }
        .consent-page-item img { width: 100%; height: 100%; object-fit: cover; }
        .consent-page-num {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.5); color: white; font-size: 10px;
            text-align: center; padding: 2px 0; font-weight: 600;
        }
        .consent-page-del {
            position: absolute; top: 4px; right: 4px;
            width: 20px; height: 20px; border-radius: 50%;
            background: rgba(0,0,0,0.5); color: white; font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; line-height: 1;
        }
        .consent-page-del:active { background: var(--danger-color); }
        .consent-add-btn {
            flex-shrink: 0; width: 80px; height: 106px; border-radius: 12px;
            border: 2px dashed rgba(43, 164, 113, 0.2); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; gap: 4px; transition: all 0.2s;
        }
        .consent-add-btn:active { background: var(--primary-light); }
        .consent-add-btn span:first-child { font-size: 22px; color: var(--primary-color); }
        .consent-add-btn span:last-child { font-size: 10px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="history.back()">‹</div>
        <h1>协助患者建档</h1>
        <div style="width: 32px;"></div>
    </div>

    <div class="container animate-up">
        <!-- 患者信息提示 -->
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding: 16px; background: var(--primary-light); border-radius: 16px;">
            <div style="font-size: 24px;">👤</div>
            <div>
                <div style="font-size: 14px; font-weight: 600; color: var(--primary-color);">协助患者上传入组资料</div>
                <div style="font-size: 12px; color: var(--text-secondary);">拍照上传后系统自动识别，确认信息后提交</div>
            </div>
        </div>

        <!-- 上传卡片区 -->
        <div id="uploadSection">
            <div style="font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 1px;">上传材料</div>
            <div class="doc-grid">
                <div class="doc-upload-card" id="card-idcard" onclick="triggerUpload('idcard')">
                    <div class="doc-icon" style="background: #EAF7F1;">🪪</div>
                    <div class="doc-name">身份证正面</div>
                    <div class="doc-hint">必传 · 拍照上传</div>
                    <div class="doc-check">✓</div>
                    <img class="doc-thumb" id="thumb-idcard">
                </div>
                <div class="doc-upload-card" id="card-diagnosis" onclick="triggerUpload('diagnosis')">
                    <div class="doc-icon" style="background: #FFF2E6;">📋</div>
                    <div class="doc-name">诊断证明</div>
                    <div class="doc-hint">必传 · 拍照上传</div>
                    <div class="doc-check">✓</div>
                    <img class="doc-thumb" id="thumb-diagnosis">
                </div>
                <div class="doc-upload-card" id="card-prescription" onclick="triggerUpload('prescription')">
                    <div class="doc-icon" style="background: #E8F8E8;">💊</div>
                    <div class="doc-name">处方单</div>
                    <div class="doc-hint">选传 · 拍照上传</div>
                    <div class="doc-check">✓</div>
                    <img class="doc-thumb" id="thumb-prescription">
                </div>
                <div class="doc-upload-card" id="card-consent" onclick="triggerConsentUpload()">
                    <div class="doc-icon" style="background: #F3E8FF;">🖋️</div>
                    <div class="doc-name">知情同意书</div>
                    <div class="doc-hint" id="consent-hint">必传 · 支持多页</div>
                    <div class="doc-check">✓</div>
                    <img class="doc-thumb" style="display:none">
                </div>
            </div>
            <input type="file" id="fileInput" hidden accept="image/*" capture="environment">
            <input type="file" id="consentFileInput" hidden accept="image/*" capture="environment">

            <!-- 知情同意书多页上传区 -->
            <div class="consent-multi-area" id="consentMultiArea" style="display: none;">
                <div class="consent-header">
                    <span class="consent-header-title">🖋️ 知情同意书</span>
                    <span class="consent-count" id="consentCount">已上传 0 页</span>
                </div>
                <div class="consent-pages" id="consentPages">
                    <div class="consent-add-btn" onclick="triggerConsentUpload()">
                        <span>+</span>
                        <span>添加</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- OCR 识别中 -->
        <div class="ocr-loading" id="ocrLoading">
            <div class="ocr-spinner"></div>
            <div style="font-size: 15px; font-weight: 600; color: var(--text-main);">AI 正在识别中...</div>
            <div style="font-size: 12px; color: var(--text-muted); margin-top: 6px;">请稍候，正在提取文字信息</div>
        </div>

        <!-- 识别结果 -->
        <div class="ocr-result" id="ocrResult">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
                <div style="font-size: 13px; font-weight: 600; color: var(--text-muted); letter-spacing: 1px;">识别结果</div>
                <span class="result-tag">AI 已识别 · 可修改</span>
            </div>
            <div class="form-section" style="padding: 4px 16px;">
                <div class="result-field">
                    <span class="result-label"><span class="required-mark">*</span>姓名</span>
                    <input type="text" class="result-value" id="r-name" value="" placeholder="待识别">
                </div>
                <div class="result-field">
                    <span class="result-label"><span class="required-mark">*</span>身份证号</span>
                    <input type="text" class="result-value" id="r-idcard" value="" placeholder="待识别">
                </div>
                <div class="result-field">
                    <span class="result-label">性别</span>
                    <input type="text" class="result-value" id="r-gender" value="" placeholder="待识别">
                </div>
                <div class="result-field">
                    <span class="result-label">出生日期</span>
                    <input type="date" class="result-value" id="r-birth" value="">
                </div>
            </div>
            <div class="form-section" style="padding: 4px 16px; margin-top: 16px;">
                <div class="result-field">
                    <span class="result-label"><span class="required-mark">*</span>确诊疾病</span>
                    <input type="text" class="result-value" id="r-disease" value="" placeholder="待识别">
                </div>
                <div class="result-field">
                    <span class="result-label">疾病分期</span>
                    <input type="text" class="result-value" id="r-stage" value="" placeholder="待识别">
                </div>
                <div class="result-field">
                    <span class="result-label">确诊医院</span>
                    <input type="text" class="result-value" id="r-hospital" value="" placeholder="待识别">
                </div>
            </div>
            <div class="form-section" style="padding: 4px 16px; margin-top: 16px;">
                <div class="result-field">
                    <span class="result-label">用药方案</span>
                    <input type="text" class="result-value" id="r-medication" value="" placeholder="选传后识别">
                </div>
                <div class="result-field">
                    <span class="result-label"><span class="required-mark">*</span>手机号</span>
                    <input type="tel" class="result-value" id="r-phone" value="" placeholder="请手动输入" maxlength="11" style="color: var(--primary-color);">
                </div>
            </div>

            <button class="btn btn-primary" style="margin-top: 24px; background: var(--primary-gradient);" onclick="handleSubmit()">确认提交建档</button>
            <p style="text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 16px;">
                信息仅用于临床管理，已加密存储
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let currentUploadType = '';
        const uploadedTypes = {};
        const consentPages = [];

        function simulateOCR(type) {
            const results = {
                idcard: { name: '林建国', idCard: '310115199203151234', gender: '男', birthDate: '1992-03-15' },
                diagnosis: { disease: '非小细胞肺癌 (NSCLC)', stage: 'III期', hospital: '上海交通大学附属瑞金医院' },
                prescription: { medication: 'PD-1 单抗 + 顺铂', dosage: '200mg Q3W' },
                consent: { signDate: new Date().toISOString().split('T')[0], status: '已签署' }
            };
            return results[type] || {};
        }

        function triggerUpload(type) {
            currentUploadType = type;
            document.getElementById('fileInput').click();
        }

        function triggerConsentUpload() {
            document.getElementById('consentFileInput').click();
        }

        // 普通材料上传
        document.getElementById('fileInput').addEventListener('change', function() {
            if (!this.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const card = document.getElementById('card-' + currentUploadType);
                card.classList.add('uploaded');
                card.querySelector('.doc-hint').innerText = '已上传 ✓';
                document.getElementById('thumb-' + currentUploadType).src = e.target.result;
                uploadedTypes[currentUploadType] = e.target.result;
                runOCR(currentUploadType);
            };
            reader.readAsDataURL(this.files[0]);
            this.value = '';
        });

        // 知情同意书多页上传
        document.getElementById('consentFileInput').addEventListener('change', function() {
            if (!this.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                consentPages.push(e.target.result);
                renderConsentPages();
                const card = document.getElementById('card-consent');
                card.classList.add('uploaded');
                document.getElementById('consent-hint').innerText = `已上传 ${consentPages.length} 页`;
                uploadedTypes['consent'] = true;
            };
            reader.readAsDataURL(this.files[0]);
            this.value = '';
        });

        function renderConsentPages() {
            const container = document.getElementById('consentPages');
            document.getElementById('consentMultiArea').style.display = 'block';
            document.getElementById('consentCount').innerText = `已上传 ${consentPages.length} 页`;
            let html = consentPages.map((src, i) => `
                <div class="consent-page-item">
                    <img src="${src}">
                    <div class="consent-page-num">第 ${i + 1} 页</div>
                    <div class="consent-page-del" onclick="event.stopPropagation(); removeConsentPage(${i})">✕</div>
                </div>
            `).join('');
            html += '<div class="consent-add-btn" onclick="triggerConsentUpload()"><span>+</span><span>添加</span></div>';
            container.innerHTML = html;
        }

        function removeConsentPage(index) {
            consentPages.splice(index, 1);
            if (consentPages.length === 0) {
                document.getElementById('consentMultiArea').style.display = 'none';
                document.getElementById('card-consent').classList.remove('uploaded');
                document.getElementById('consent-hint').innerText = '必传 · 支持多页';
                delete uploadedTypes['consent'];
            }
            renderConsentPages();
        }

        function runOCR(type) {
            document.getElementById('ocrLoading').classList.add('active');
            setTimeout(() => {
                const result = simulateOCR(type);
                if (result.name) document.getElementById('r-name').value = result.name;
                if (result.idCard) document.getElementById('r-idcard').value = result.idCard;
                if (result.gender) document.getElementById('r-gender').value = result.gender;
                if (result.birthDate) document.getElementById('r-birth').value = result.birthDate;
                if (result.disease) document.getElementById('r-disease').value = result.disease;
                if (result.stage) document.getElementById('r-stage').value = result.stage;
                if (result.hospital) document.getElementById('r-hospital').value = result.hospital;
                if (result.medication) document.getElementById('r-medication').value = result.medication + ' ' + (result.dosage || '');
                document.getElementById('ocrLoading').classList.remove('active');
                document.getElementById('ocrResult').classList.add('active');
            }, 1500);
        }

        function handleSubmit() {
            const name = document.getElementById('r-name').value;
            const idCard = document.getElementById('r-idcard').value;
            const disease = document.getElementById('r-disease').value;
            const phone = document.getElementById('r-phone').value;
            if (!name || !idCard || !disease) { alert('请确保姓名、身份证号和确诊疾病已填写'); return; }
            if (!phone || !/^1\d{10}$/.test(phone)) { alert('请输入正确的手机号码'); return; }
            if (consentPages.length === 0) { alert('请上传知情同意书（至少 1 页）'); return; }

            // 模拟保存逻辑，包含多页数组
            console.log("Saving patient with consentPages:", consentPages);
            
            alert('建档成功！患者资料已提交审核');
            history.back();
        }
    </script>
</body>
</html>
