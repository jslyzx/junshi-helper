<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>失访召回 - 项目专员端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
        .step-indicator::before { content: ''; position: absolute; top: 15px; left: 0; right: 0; height: 2px; background: #E5E6EB; z-index: 1; }
        .step-dot {
            width: 32px; height: 32px; border-radius: 50%; background: white; border: 2px solid #E5E6EB;
            display: flex; align-items: center; justify-content: center; z-index: 2; font-size: 12px; font-weight: 700; color: var(--text-muted);
            transition: all 0.3s;
        }
        .step-dot.active { background: #EA5455; border-color: #EA5455; color: white; }
        .step-dot.completed { background: #FDEEEE; border-color: #EA5455; color: #EA5455; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .form-input {
            width: 100%; height: 48px; border-radius: 12px; border: 1px solid #E5E6EB; padding: 0 16px;
            font-size: 15px; font-family: inherit; transition: border-color 0.2s; background: white;
        }
        .form-input:focus { outline: none; border-color: #EA5455; background: #FFF9F9; }
        
        .radio-group { display: flex; flex-direction: column; gap: 12px; }
        .radio-item { 
            display: flex; align-items: center; gap: 10px; font-size: 14px; 
            background: white; padding: 14px 16px; border-radius: 12px; border: 1px solid #E5E6EB;
        }
        .radio-item input[type="radio"] { width: 18px; height: 18px; accent-color: #EA5455; }

        .btn-group {
            position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; padding-bottom: calc(20px + var(--safe-area-bottom));
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid #F0F2F5; display: flex; gap: 12px; z-index: 100;
        }
        .btn-flex { flex: 1; height: 50px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-flex:active { transform: scale(0.96); opacity: 0.9; }
        .btn-outline { background: #F2F3F5; color: var(--text-secondary); }
        .btn-primary { background: linear-gradient(135deg, #EA5455 0%, #B22222 100%); color: white; box-shadow: 0 12px 32px rgba(234, 84, 85, 0.2); }
    </style>
</head>
<body>
    <div class="header" style="position: sticky; top: 0; z-index: 10;">
        <div class="back-btn" onclick="history.back()">✕</div>
        <h1>失访召回登记</h1>
    </div>

    <div class="container" style="padding-bottom: 120px;">
        <div class="step-indicator">
            <div class="step-dot active">1</div>
            <div class="step-dot">2</div>
            <div class="step-dot">3</div>
        </div>

        <!-- 步骤 1: 召回对象选定 -->
        <div id="step1" class="animate-up">
            <div class="section-title">召回对象信息</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">逾期失访患者</label>
                    <select class="form-input">
                        <option value="">请选择需召回患者...</option>
                        <option value="1" selected>张*兰 (逾期 5 天 | 第二次致电)</option>
                        <option value="2">陈*刚 (逾期 14 天 | 临界脱落)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">可能失访原因初步判断</label>
                    <select class="form-input">
                        <option>忘记时间/行程冲突</option>
                        <option>出现无法忍受的不良反应</option>
                        <option selected>联系方式失效/无人接听</option>
                        <option>主动拒绝继续参与试验</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 步骤 2: 沟通记录 -->
        <div id="step2" class="hidden">
            <div class="section-title">沟通执行记录</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">本次联络方式</label>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn-flex btn-outline" style="background: #FDEEEE; border-color: #EA5455; color: #EA5455;">电话致电</button>
                        <button class="btn-flex btn-outline">微信语音/消息</button>
                        <button class="btn-flex btn-outline">短信通知</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">联络结果</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="result" checked> 成功接通且承诺返院</label>
                        <label class="radio-item"><input type="radio" name="result"> 成功接通但存在返院困难</label>
                        <label class="radio-item"><input type="radio" name="result"> 无人接听 / 挂断</label>
                        <label class="radio-item"><input type="radio" name="result"> 空号 / 停机</label>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">沟通纪要详情</label>
                    <textarea class="form-input" style="height: 80px; padding-top: 12px; resize: none;" placeholder="详细记录患者反馈的困难或拒绝理由..."></textarea>
                </div>
            </div>
        </div>

        <!-- 步骤 3: 计划与上报 -->
        <div id="step3" class="hidden">
            <div class="section-title">后续处置计划</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">下一步动作</label>
                    <select class="form-input">
                        <option>预约延期随访门诊</option>
                        <option>次日再次尝试致电</option>
                        <option>联系共同居住家属/紧急联系人</option>
                        <option>上报主要研究者(PI)判定出组</option>
                    </select>
                </div>
                <!-- 动态条件字段，若是预约随访则显示 -->
                <div class="form-group">
                    <label class="form-label">重新约定来院日期</label>
                    <input type="date" class="form-input" value="2024-04-25">
                </div>
            </div>
            
            <div class="section-title">流程确认</div>
            <div class="card">
                <p style="font-size: 13px; color: var(--text-secondary); line-height: 1.6;">
                    基于 GCP 规范，失访跟进不得少于 3 次有效尝试。请确认本次记录属实，上报至系统将作为稽查凭证。
                </p>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-flex btn-outline" id="prevBtn" onclick="prevStep()" style="display: none;">上一步</button>
        <button class="btn-flex btn-primary" id="nextBtn" onclick="nextStep()">下一步</button>
    </div>

    <script>
        let currentStep = 1;

        function nextStep() {
            if (currentStep < 3) {
                document.getElementById(`step${currentStep}`).classList.add('hidden');
                document.getElementById(`step${currentStep}`).classList.remove('animate-up');
                
                const dots = document.querySelectorAll('.step-dot');
                dots[currentStep-1].classList.remove('active');
                dots[currentStep-1].classList.add('completed');
                
                currentStep++;
                
                const nextSection = document.getElementById(`step${currentStep}`);
                nextSection.classList.remove('hidden');
                void nextSection.offsetWidth; 
                nextSection.classList.add('animate-up');
                
                dots[currentStep-1].classList.add('active');
                
                updateBtns();
                window.scrollTo(0, 0);
            } else {
                alert('召回记录已同步保存！');
                window.location.href = 'index.html';
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                document.getElementById(`step${currentStep}`).classList.add('hidden');
                document.getElementById(`step${currentStep}`).classList.remove('animate-up');
                
                const dots = document.querySelectorAll('.step-dot');
                dots[currentStep-1].classList.remove('active');

                currentStep--;
                
                const prevSection = document.getElementById(`step${currentStep}`);
                prevSection.classList.remove('hidden');
                void prevSection.offsetWidth;
                prevSection.classList.add('animate-up');
                
                dots[currentStep-1].classList.remove('completed');
                dots[currentStep-1].classList.add('active');

                updateBtns();
                window.scrollTo(0, 0);
            }
        }

        function updateBtns() {
            document.getElementById('prevBtn').style.display = currentStep === 1 ? 'none' : 'block';
            document.getElementById('nextBtn').innerText = currentStep === 3 ? '立卷归档' : '下一步';
        }
    </script>
</body>
</html>
