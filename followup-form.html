<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>现场补访记录 - 项目专员端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .step-indicator {
            display: flex; justify-content: space-between; margin-bottom: 30px; position: relative;
        }
        .step-indicator::before {
            content: ''; position: absolute; top: 15px; left: 0; right: 0; height: 2px;
            background: #E5E6EB; z-index: 1;
        }
        .step-dot {
            width: 32px; height: 32px; border-radius: 50%; background: white; border: 2px solid #E5E6EB;
            display: flex; align-items: center; justify-content: center; z-index: 2; font-size: 12px; font-weight: 700; color: var(--text-muted);
            transition: all 0.3s;
        }
        .step-dot.active { background: var(--primary-color); border-color: var(--primary-color); color: white; }
        .step-dot.completed { background: var(--primary-light); border-color: var(--primary-color); color: var(--primary-color); }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .form-input {
            width: 100%; height: 48px; border-radius: 12px; border: 1px solid #E5E6EB; padding: 0 16px;
            font-size: 15px; font-family: inherit; transition: border-color 0.2s; background: white;
        }
        .form-input:focus { outline: none; border-color: var(--primary-color); background: var(--primary-soft); }
        
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }

        .checkbox-group { display: flex; flex-direction: column; gap: 12px; }
        .checkbox-item { 
            display: flex; align-items: center; gap: 10px; font-size: 14px; 
            background: white; padding: 12px 16px; border-radius: 12px; border: 1px solid #E5E6EB;
        }
        .checkbox-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary-color); }

        .btn-group {
            position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; padding-bottom: calc(20px + var(--safe-area-bottom));
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid #F0F2F5; display: flex; gap: 12px; z-index: 100;
        }
        .btn-flex { flex: 1; height: 50px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-flex:active { transform: scale(0.96); opacity: 0.9; }
        .btn-outline { background: #F2F3F5; color: var(--text-secondary); }
        .btn-primary { background: var(--primary-gradient); color: white; box-shadow: var(--shadow-lg); }
    </style>
</head>
<body>
    <div class="header" style="position: sticky; top: 0; z-index: 10;">
        <div class="back-btn" onclick="history.back()">✕</div>
        <h1>现场补访录入</h1>
    </div>

    <div class="container" style="padding-bottom: 120px;">
        <!-- 步骤进度 -->
        <div class="step-indicator">
            <div class="step-dot active">1</div>
            <div class="step-dot">2</div>
            <div class="step-dot">3</div>
        </div>

        <!-- 步骤 1: 患者与基础体征 -->
        <div id="step1" class="animate-up">
            <div class="section-title">补访对象确认</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">待补访患者</label>
                    <select class="form-input">
                        <option value="">请选择患者...</option>
                        <option value="1" selected>刘*财 (D14 实验室检查单核对)</option>
                        <option value="2">张*兰 (失访召回后补访)</option>
                        <option value="3">李*明 (D21 补访登记)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 12px;">
                    <label class="form-label">补访地点</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" class="form-input" value="上海交通大学附属瑞金医院" style="flex: 1;">
                        <button class="btn-flex btn-outline" style="width: 50px; flex: none;">📍</button>
                    </div>
                </div>
            </div>

            <div class="section-title">补访合规记录</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">补访原因说明</label>
                    <select class="form-input">
                        <option>常规随访未能如期完成</option>
                        <option>临床关键指标（AE/SAE）需现场核实</option>
                        <option>原始病历资料现场核对</option>
                        <option>失访患者现场寻访</option>
                        <option>其他原因</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 12px;">
                    <label class="form-label">访视签到照片</label>
                    <div style="width: 100px; height: 100px; border: 1.5px dashed #E5E6EB; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; background: #F9FAFB;">
                        <span style="font-size: 24px;">📸</span>
                        <span style="font-size: 10px; margin-top: 4px;">拍照上传</span>
                    </div>
                </div>
            </div>

            <div class="section-title">生命体征采集</div>
            <div class="card">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">体重 (kg)</label>
                        <input type="number" class="form-input" placeholder="0.0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">心率 (bpm)</label>
                        <input type="number" class="form-input" placeholder="0">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">血压 (mmHg)</label>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="number" class="form-input" placeholder="收缩压" style="text-align: center;">
                        <span style="color: var(--text-muted);">/</span>
                        <input type="number" class="form-input" placeholder="舒张压" style="text-align: center;">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">ECOG 评分</label>
                    <select class="form-input">
                        <option>0 - 活动能力完全正常</option>
                        <option>1 - 能从事轻体力活动</option>
                        <option>2 - 生活自理但丧失工作能力</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 步骤 2: 不良事件与用药 -->
        <div id="step2" class="hidden">
            <div class="section-title">不良事件 (AE) 核查</div>
            <div class="card">
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px;">请询问患者自上次访视以来是否出现以下常见症状，若有请勾选并做详细记录：</p>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox"> 皮肤发痒及红疹
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox"> 恶心、呕吐等胃肠道反应
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox"> 异常疲劳或虚弱
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox"> 其他异常情况
                    </label>
                </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label class="form-label">具体情况补充说明</label>
                    <textarea class="form-input" style="height: 80px; padding-top: 12px; resize: none;" placeholder="无。或详细描述发作时间、程度等..."></textarea>
                </div>
            </div>

            <div class="section-title">合并用药记录</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">近期是否有新增合并用药？</label>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn-flex btn-outline" style="background: var(--primary-soft); border-color: var(--primary-color); color: var(--primary-color);" onclick="alert('即将展开新增用药表单')">是</button>
                        <button class="btn-flex btn-outline">否/无变化</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 步骤 3: 随访计划与确认 -->
        <div id="step3" class="hidden">
            <div class="section-title">下期计划</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">下次计划访视日期</label>
                    <input type="date" class="form-input" value="2024-05-06">
                </div>
                <div class="form-group">
                    <label class="form-label">特别提醒备注</label>
                    <input type="text" class="form-input" placeholder="例如：需空腹抽血">
                </div>
            </div>

            <div class="section-title">提交确认</div>
            <div class="card">
                <p style="font-size: 13px; color: var(--text-secondary); line-height: 1.6;">
                    本人确认以上录入数据已与患者或家属进行核实，数据真实有效，符合本研究操作规范 (SOP)。
                </p>
            </div>
        </div>
    </div>

    <!-- 底部按钮 -->
    <div class="btn-group">
        <button class="btn-flex btn-outline" id="prevBtn" onclick="prevStep()" style="display: none;">上一步</button>
        <button class="btn-flex btn-primary" id="nextBtn" onclick="nextStep()">下一步</button>
    </div>

    <script>
        let currentStep = 1;

        function nextStep() {
            if (currentStep < 3) {
                document.getElementById(`step${currentStep}`).classList.add('hidden');
                document.getElementById(`step${currentStep}`).classList.remove('animate-up');
                
                const dots = document.querySelectorAll('.step-dot');
                dots[currentStep-1].classList.remove('active');
                dots[currentStep-1].classList.add('completed');
                
                currentStep++;
                
                const nextSection = document.getElementById(`step${currentStep}`);
                nextSection.classList.remove('hidden');
                // Force layout reflow to restart animation
                void nextSection.offsetWidth; 
                nextSection.classList.add('animate-up');
                
                dots[currentStep-1].classList.add('active');
                
                updateBtns();
                window.scrollTo(0, 0);
            } else {
                alert('现场补访记录已提交并同步临床系统！');
                window.location.href = 'index.html';
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                document.getElementById(`step${currentStep}`).classList.add('hidden');
                document.getElementById(`step${currentStep}`).classList.remove('animate-up');
                
                const dots = document.querySelectorAll('.step-dot');
                dots[currentStep-1].classList.remove('active');

                currentStep--;
                
                const prevSection = document.getElementById(`step${currentStep}`);
                prevSection.classList.remove('hidden');
                void prevSection.offsetWidth;
                prevSection.classList.add('animate-up');
                
                dots[currentStep-1].classList.remove('completed');
                dots[currentStep-1].classList.add('active');

                updateBtns();
                window.scrollTo(0, 0);
            }
        }

        function updateBtns() {
            document.getElementById('prevBtn').style.display = currentStep === 1 ? 'none' : 'block';
            document.getElementById('nextBtn').innerText = currentStep === 3 ? '确认并提交' : '下一步';
        }
    </script>
</body>
</html>
