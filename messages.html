<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>消息中心 - 项目专员端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .msg-action-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 4px; margin-bottom: 8px;
        }
        .msg-unread-text { font-size: 13px; color: var(--text-muted); }
        .msg-read-all { font-size: 13px; color: var(--primary-color); font-weight: 600; cursor: pointer; }

        .msg-card {
            background: white; border-radius: 20px; padding: 18px; margin-bottom: 12px;
            border: 1px solid #F0F2F5; display: flex; gap: 14px; position: relative;
            transition: all 0.2s;
        }
        .msg-card:active { transform: scale(0.98); background: #F9FAFB; }
        
        .msg-unread-dot {
            position: absolute; top: 18px; right: 18px; width: 8px; height: 8px;
            background: var(--danger-color); border-radius: 50%;
        }

        .msg-icon-box {
            width: 46px; height: 46px; border-radius: 14px; display: flex;
            align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
        }
        
        .msg-content { flex: 1; }
        .msg-title { font-size: 15px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .msg-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
        .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="location.href='index.html'">✕</div>
        <h1>消息中心</h1>
        <div style="width: 32px;"></div>
    </div>

    <div class="container animate-up">
        <div class="msg-action-bar">
            <span class="msg-unread-text" id="unreadSummary">共 2 条未读消息</span>
            <span class="msg-read-all" onclick="markAllRead()">全部已读</span>
        </div>

        <div id="msgList">
            <!-- 由 JS 渲染 -->
        </div>
    </div>

    <!-- 底部 Tab 栏 -->
    <nav class="tab-bar">
        <a href="index.html" class="tab-item">
            <span class="tab-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="task-list.html" class="tab-item">
            <span class="tab-icon" style="position: relative;">📋 <span class="badge">14</span></span>
            <span>任务管理</span>
        </a>
        <a href="report-center.html" class="tab-item">
            <span class="tab-icon">📊</span>
            <span>数据报表</span>
        </a>
        <a href="my.html" class="tab-item">
            <span class="tab-icon">👤</span>
            <span>我的</span>
        </a>
    </nav>

    <script src="js/app.js"></script>
    <script>
        function renderMessages() {
            const list = document.getElementById('msgList');
            const messages = App.getMessages();
            const unreadCount = App.getUnreadCount();

            document.getElementById('unreadSummary').innerText = unreadCount > 0 ? `共 ${unreadCount} 条未读消息` : `暂无未读消息`;

            if (messages.length === 0) {
                list.innerHTML = '<div class="empty-state">📭 暂无消息通知</div>';
                return;
            }

            list.innerHTML = messages.map(msg => `
                <div class="msg-card" onclick="handleMsgClick(${msg.id})">
                    ${msg.unread ? '<div class="msg-unread-dot"></div>' : ''}
                    <div class="msg-icon-box ${msg.color}">${msg.icon}</div>
                    <div class="msg-content">
                        <div class="msg-title">${msg.title}</div>
                        <div class="msg-desc">${msg.desc}</div>
                        <div class="msg-time">${msg.time}</div>
                    </div>
                </div>
            `).join('');
        }

        function handleMsgClick(id) {
            // 模拟标记为已读并跳转
            const msg = MockData.messages.find(m => m.id === id);
            if (msg) {
                msg.unread = false;
                renderMessages();
                
                // 根据类型模拟跳转
                if (msg.type === 'alert') {
                    setTimeout(() => alert(`即将跳转至任务处理：${msg.title}`), 100);
                } else if (msg.type === 'qc') {
                    setTimeout(() => location.href = 'report-center.html', 100);
                } else if (msg.type === 'complaint') {
                    setTimeout(() => location.href = 'complaint-list.html', 100);
                }
            }
        }

        function markAllRead() {
            MockData.messages.forEach(m => m.unread = false);
            renderMessages();
            alert('已全部标记为已读');
        }

        document.addEventListener('DOMContentLoaded', renderMessages);
    </script>
</body>
</html>
